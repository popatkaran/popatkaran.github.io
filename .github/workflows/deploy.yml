name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
        working-directory: .
      - run: npm run lint

  test-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/theme
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
        working-directory: .
      - run: npm test

  test-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
        working-directory: .
      - run: npx playwright install --with-deps
      - run: npm run test:e2e

  build-package:
    runs-on: ubuntu-latest
    needs: [lint, test-package]
    defaults:
      run:
        working-directory: packages/theme
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
        working-directory: .
      - run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-package]
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
        working-directory: .
      - run: npm run build
